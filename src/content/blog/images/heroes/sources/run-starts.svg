<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6efe2"/>
  <!-- the flat-footed defensive line, watching the ball -->
  <g>
    <circle cx="620" cy="130" r="40" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="620" cy="130" r="40" fill="#b3a68d"/>
    <circle cx="600" cy="300" r="40" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="600" cy="300" r="40" fill="#b3a68d"/>
    <circle cx="620" cy="470" r="40" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="620" cy="470" r="40" fill="#b3a68d"/>
  </g>
  <!-- the runner's path: already moving, curling behind the line -->
  <path d="M 330 545 Q 560 590 760 500 Q 880 445 930 360" fill="none" stroke="#d97706" stroke-width="9" stroke-linecap="round" stroke-dasharray="0.1 26"/>
  <polygon points="945,330 894,372 940,398" fill="#d97706"/>
  <!-- the runner, mid-stride -->
  <circle cx="330" cy="545" r="46" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="330" cy="545" r="46" fill="#006437"/>
  <!-- the passer, ball at their feet -->
  <circle cx="185" cy="170" r="46" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="185" cy="170" r="46" fill="#006437"/>
  <circle cx="262" cy="212" r="26" fill="#5f5546" opacity="0.16" transform="translate(6 6)"/>
  <circle cx="262" cy="212" r="26" fill="#c2410c"/>
  <path d="M 236 212 H 288 M 262 186 V 238" stroke="#f6efe2" stroke-width="4" fill="none"/>
  <!-- the pass: played to where the runner will be, not where they are -->
  <path d="M 300 190 Q 640 120 960 230" fill="none" stroke="#c2410c" opacity="0.22" stroke-width="30" stroke-linecap="round"/>
  <path d="M 300 190 Q 640 120 960 230" fill="none" stroke="#c2410c" stroke-width="12" stroke-linecap="round" stroke-dasharray="0.1 30"/>
  <polygon points="1006,250 936,196 924,260" fill="#c2410c"/>
  <!-- the meeting point: space that is empty right now -->
  <circle cx="1040" cy="290" r="58" fill="none" stroke="#d97706" stroke-width="8" stroke-dasharray="0.1 22" stroke-linecap="round"/>
</svg>
