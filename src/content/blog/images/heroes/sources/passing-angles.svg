<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6efe2"/>
  <!-- two passing lanes opening around a single defender -->
  <path d="M 290 302 Q 570 210 836 167" fill="none" stroke="#c2410c" opacity="0.20" stroke-width="28" stroke-linecap="round"/>
  <path d="M 290 302 Q 570 210 836 167" fill="none" stroke="#c2410c" stroke-width="12" stroke-linecap="round" stroke-dasharray="0.1 30"/>
  <polygon points="858,160 834,177 832,151" fill="#c2410c"/>
  <path d="M 290 328 Q 570 420 836 463" fill="none" stroke="#c2410c" opacity="0.20" stroke-width="28" stroke-linecap="round"/>
  <path d="M 290 328 Q 570 420 836 463" fill="none" stroke="#c2410c" stroke-width="12" stroke-linecap="round" stroke-dasharray="0.1 30"/>
  <polygon points="858,470 832,479 838,453" fill="#c2410c"/>
  <!-- the defender, stuck between the two angles -->
  <circle cx="560" cy="315" r="40" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
  <circle cx="560" cy="315" r="40" fill="#b3a68d"/>
  <!-- the two receivers -->
  <circle cx="905" cy="150" r="44" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="905" cy="150" r="44" fill="#006437"/>
  <circle cx="905" cy="480" r="44" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="905" cy="480" r="44" fill="#006437"/>
  <!-- the ball-handler with two ways out -->
  <circle cx="230" cy="315" r="52" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="230" cy="315" r="52" fill="#006437"/>
  <!-- the ball -->
  <circle cx="230" cy="380" r="24" fill="#5f5546" opacity="0.16" transform="translate(6 6)"/>
  <circle cx="230" cy="380" r="24" fill="#c2410c"/>
  <path d="M 206 380 H 254 M 230 356 V 404" stroke="#f6efe2" stroke-width="4" fill="none"/>
</svg>
