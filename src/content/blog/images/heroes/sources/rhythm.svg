<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6efe2"/>
  <!-- baseline -->
  <line x1="80" y1="470" x2="1120" y2="470" stroke="#8a7a63" stroke-width="8" stroke-linecap="round"/>
  <!-- metronome ticks -->
  <g stroke="#d97706" stroke-width="7" stroke-linecap="round">
    <line x1="180" y1="470" x2="180" y2="504"/>
    <line x1="420" y1="470" x2="420" y2="504"/>
    <line x1="660" y1="470" x2="660" y2="504"/>
    <line x1="900" y1="470" x2="900" y2="504"/>
    <line x1="1080" y1="470" x2="1080" y2="504"/>
  </g>
  <!-- bounce path -->
  <path d="M 180 430 Q 300 140 420 430 Q 540 210 660 430 Q 780 270 900 430 Q 990 330 1080 436"
        fill="none" stroke="#8a7a63" stroke-width="8" stroke-linecap="round" stroke-dasharray="0.1 24"/>
  <!-- the ball at each beat, shrinking as the bounce settles -->
  <g>
    <circle cx="188" cy="438" r="52" fill="#5f5546" opacity="0.16"/>
    <circle cx="180" cy="430" r="52" fill="#006437"/>
    <circle cx="428" cy="438" r="42" fill="#5f5546" opacity="0.16"/>
    <circle cx="420" cy="430" r="42" fill="#006437"/>
    <circle cx="668" cy="438" r="34" fill="#5f5546" opacity="0.16"/>
    <circle cx="660" cy="430" r="34" fill="#006437"/>
    <circle cx="908" cy="438" r="27" fill="#5f5546" opacity="0.16"/>
    <circle cx="900" cy="430" r="27" fill="#006437"/>
    <circle cx="1086" cy="442" r="21" fill="#5f5546" opacity="0.16"/>
    <circle cx="1080" cy="436" r="21" fill="#c2410c"/>
  </g>
  <!-- apex accents: the moment of hang -->
  <g fill="#d97706">
    <circle cx="300" cy="220" r="10"/>
    <circle cx="540" cy="290" r="9"/>
    <circle cx="780" cy="330" r="8"/>
    <circle cx="990" cy="370" r="7"/>
  </g>
</svg>
