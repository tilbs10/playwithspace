<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6efe2"/>
  <!-- faint halfway line + centre circle -->
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ece1c8" stroke-width="14"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="#ece1c8" stroke-width="14"/>
  <!-- three lanes sprinting right -->
  <g stroke-linecap="round">
    <path d="M 130 315 L 940 315" stroke="#5f5546" opacity="0.14" stroke-width="30" transform="translate(8 8)"/>
    <path d="M 130 315 L 940 315" stroke="#006437" stroke-width="30"/>
    <polygon points="1030,315 920,258 920,372" fill="#006437"/>
    <path d="M 200 130 L 800 130" stroke="#006437" stroke-width="16"/>
    <polygon points="862,130 786,92 786,168" fill="#006437"/>
    <path d="M 200 500 L 780 500" stroke="#006437" stroke-width="16"/>
    <polygon points="842,500 766,462 766,538" fill="#006437"/>
  </g>
  <!-- the pass ahead -->
  <path d="M 700 280 Q 880 160 1020 128" fill="none" stroke="#c2410c" stroke-width="11" stroke-linecap="round" stroke-dasharray="0.1 30"/>
  <polygon points="1062,118 990,102 1006,164" fill="#c2410c"/>
  <!-- ball arriving -->
  <circle cx="1124" cy="102" r="30" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
  <circle cx="1124" cy="102" r="30" fill="#c2410c"/>
  <path d="M 1094 102 H 1154 M 1124 72 V 132" stroke="#f6efe2" stroke-width="4.5" fill="none"/>
</svg>
