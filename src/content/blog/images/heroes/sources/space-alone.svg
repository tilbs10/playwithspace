<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f6efe2"/>
  <!-- the manufactured pocket of space around the star -->
  <circle cx="600" cy="315" r="120" fill="none" stroke="#d97706" stroke-width="8" stroke-dasharray="0.1 22" stroke-linecap="round"/>
  <!-- four teammates' runs, pulling defenders out to the edges -->
  <g fill="none" stroke="#d97706" stroke-width="9" stroke-linecap="round" stroke-dasharray="0.1 26">
    <path d="M 455 290 L 305 178"/>
    <path d="M 745 290 L 895 178"/>
    <path d="M 455 340 L 305 452"/>
    <path d="M 745 340 L 895 452"/>
  </g>
  <g fill="#d97706">
    <polygon points="300,175 325.9,176.8 309.3,199.2"/>
    <polygon points="900,175 890.7,199.2 874.1,176.8"/>
    <polygon points="300,455 325.9,453.2 309.3,430.8"/>
    <polygon points="900,455 874.1,453.2 890.7,430.8"/>
  </g>
  <!-- the four dragged defenders, out at the corners -->
  <g>
    <circle cx="343" cy="223" r="36" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="343" cy="223" r="36" fill="#b3a68d"/>
    <circle cx="857" cy="223" r="36" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="857" cy="223" r="36" fill="#b3a68d"/>
    <circle cx="343" cy="407" r="36" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="343" cy="407" r="36" fill="#b3a68d"/>
    <circle cx="857" cy="407" r="36" fill="#5f5546" opacity="0.16" transform="translate(7 7)"/>
    <circle cx="857" cy="407" r="36" fill="#b3a68d"/>
  </g>
  <!-- the four teammates who did the work -->
  <g>
    <circle cx="228" cy="150" r="42" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
    <circle cx="228" cy="150" r="42" fill="#006437"/>
    <circle cx="972" cy="150" r="42" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
    <circle cx="972" cy="150" r="42" fill="#006437"/>
    <circle cx="228" cy="480" r="42" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
    <circle cx="228" cy="480" r="42" fill="#006437"/>
    <circle cx="972" cy="480" r="42" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
    <circle cx="972" cy="480" r="42" fill="#006437"/>
  </g>
  <!-- the star, alone in the space the others made -->
  <circle cx="600" cy="315" r="54" fill="#5f5546" opacity="0.16" transform="translate(8 8)"/>
  <circle cx="600" cy="315" r="54" fill="#d97706"/>
  <!-- the ball, at the star's feet -->
  <circle cx="600" cy="378" r="24" fill="#5f5546" opacity="0.16" transform="translate(6 6)"/>
  <circle cx="600" cy="378" r="24" fill="#c2410c"/>
  <path d="M 576 378 H 624 M 600 354 V 402" stroke="#f6efe2" stroke-width="4" fill="none"/>
</svg>
